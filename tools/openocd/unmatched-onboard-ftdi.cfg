#
# HiFive Unmatched onboard FTDI/JTAG configuration for xPack OpenOCD.
#
# The onboard bridge appears as FTDI "Dual RS232-HS" (VID:PID 0403:6010).
# Channel/layout defaults here are conservative and can be overridden from
# the launcher script with environment variables.
#

if { [info exists CHIPNAME] } {
	set _CHIPNAME $CHIPNAME
} else {
	set _CHIPNAME riscv
}

if { [info exists FTDI_CHANNEL] } {
	set _FTDI_CHANNEL $FTDI_CHANNEL
} else {
	set _FTDI_CHANNEL 0
}

if { [info exists ADAPTER_KHZ] } {
	set _ADAPTER_KHZ $ADAPTER_KHZ
} else {
	set _ADAPTER_KHZ 1000
}

if { [info exists EXPECTED_ID] } {
	set _EXPECTED_ID $EXPECTED_ID
} else {
	set _EXPECTED_ID ""
}

adapter driver ftdi
ftdi device_desc "Dual RS232-HS"
ftdi vid_pid 0x0403 0x6010
ftdi channel $_FTDI_CHANNEL
ftdi layout_init 0x0008 0x001b
ftdi layout_signal nSRST -oe 0x0020 -data 0x0020

transport select jtag
adapter speed $_ADAPTER_KHZ

if { $_EXPECTED_ID eq "" } {
	jtag newtap $_CHIPNAME cpu -irlen 5
} else {
	jtag newtap $_CHIPNAME cpu -irlen 5 -expected-id $_EXPECTED_ID
}

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME.0 riscv -chain-position $_TARGETNAME
$_TARGETNAME.0 configure -work-area-phys 0x80200000 -work-area-size 0x4000 -work-area-backup 0
